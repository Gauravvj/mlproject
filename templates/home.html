<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f8fbff, #eef4ff);
            color: #1f2d3d;
        }
        .page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
            padding: 32px;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.8rem;
            color: #23395d;
        }
        .subtitle {
            color: #617085;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #34495e;
        }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d6dce5;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
        }
        .btn-primary {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }
        .btn-primary:hover {
            background: #4338ca;
        }
        .result-box {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 10px;
            background: #eff6ff;
            color: #1d4ed8;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Student Exam Performance Indicator</h1>
            <p class="subtitle">Fill in the details to predict the student's maths score.</p>

            <form action="{{ url_for('predict_datapoint') }}" method="post">
                <div class="form-group">
                    <label>Gender</label>
                    <select class="form-control" name="gender" required>
                        <option selected disabled value="">Select your Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Race or Ethnicity</label>
                    <select class="form-control" name="ethnicity" required>
                        <option selected disabled value="">Select Ethnicity</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Parental Level of Education</label>
                    <select class="form-control" name="parental_level_of_education" required>
                        <option selected disabled value="">Select Parent Education</option>
                        <option value="associate's degree">associate's degree</option>
                        <option value="bachelor's degree">bachelor's degree</option>
                        <option value="high school">high school</option>
                        <option value="master's degree">master's degree</option>
                        <option value="some college">some college</option>
                        <option value="some high school">some high school</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Lunch Type</label>
                    <select class="form-control" name="lunch" required>
                        <option selected disabled value="">Select Lunch Type</option>
                        <option value="free/reduced">free/reduced</option>
                        <option value="standard">standard</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Test Preparation Course</label>
                    <select class="form-control" name="test_preparation_course" required>
                        <option selected disabled value="">Select Test Course</option>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Writing Score out of 100</label>
                    <input class="form-control" type="number" name="reading_score" placeholder="Enter your Reading score" min="0" max="100" />
                </div>
                <div class="form-group">
                    <label>Reading Score out of 100</label>
                    <input class="form-control" type="number" name="writing_score" placeholder="Enter your Reading Score" min="0" max="100" />
                </div>
                <div class="form-group">
                    <input class="btn-primary" type="submit" value="Predict your Maths Score" />
                </div>
            </form>

            {% if results is not none %}
            <div class="result-box">
                Prediction: {{ results }}
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
